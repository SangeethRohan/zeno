# Embed Zeno in an existing docker-compose.yml (clone this repo as ./zeno first):
#   git clone git@github.com:SangeethRohan/zeno.git zeno
#
# Paste under your `services:` block:

  dashboard:
    build: ./zeno/server
    container_name: zeno_dashboard
    restart: always
    ports:
      - "9090:9090"
    environment:
      # Optional basic-auth — leave unset to disable auth entirely.
      DASHBOARD_USER: admin
      DASHBOARD_PASS: admin
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
