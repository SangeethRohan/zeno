<section class="view" id="view-create-web">
  <div id="web-error" class="error-banner" style="display:none;"></div>
  <div id="web-success" class="success-banner" style="display:none;"></div>

  <div class="form-card">
    <h2>Create Web Server</h2>
    <div class="hint">Spin up a web server container with a published host port</div>

    <div class="section-label">Server type</div>
    <div class="engine-grid" id="web-type-grid">
      <div class="engine-opt selected" data-type="nginx">Nginx</div>
      <div class="engine-opt" data-type="apache">Apache</div>
      <div class="engine-opt" data-type="caddy">Caddy</div>
      <div class="engine-opt" data-type="traefik">Traefik</div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Server name</label>
        <input type="text" id="web-name" placeholder="e.g. my-site" />
      </div>
      <div class="field">
        <label>Host port</label>
        <input type="number" id="web-port" placeholder="auto if empty" min="1024" max="65535" step="1" />
        <small class="hint">Leave empty to auto-pick a free port (8080–8999)</small>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label class="toggle">
          <input type="checkbox" id="web-persistent">
          <span class="slider"></span>
          <span class="toggle-text">Persistent web root volume</span>
        </label>
        <small class="hint">Available for Nginx, Apache, and Caddy</small>
      </div>
    </div>

    <div class="submit-row">
      <button class="primary" id="submit-web-btn" type="button">Create web server</button>
    </div>

    <div class="result-block" id="web-result"></div>
  </div>
</section>
