# MongoDB overlay — merge with main compose:
#   docker compose -f docker-compose.yml -f docker-compose.mongo.yml up -d --build

services:
  zeno_mongo:
    container_name: zeno_mongo
    image: mongo:7
    restart: unless-stopped
    labels:
      zeno.app: "true"
      zeno.app.kind: "core"
    environment:
      MONGO_INITDB_ROOT_USERNAME: zeno
      MONGO_INITDB_ROOT_PASSWORD: zenopass
      MONGO_INITDB_DATABASE: zeno
    volumes:
      - zeno_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "zeno", "-p", "zenopass", "--authenticationDatabase", "admin", "--eval", "db.runCommand({ping:1})"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  dashboard:
    depends_on:
      zeno_mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://zeno:zenopass@zeno_mongo:27017/zeno?authSource=admin
      MONGO_DB: zeno

volumes:
  zeno_mongo_data:
