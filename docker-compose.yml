version: "3.9"

services:
  dashboard:
    container_name: zeno_dashboard

    build:
      context: ./server
      dockerfile: Dockerfile

    image: zeno:latest

    restart: unless-stopped

    labels:
      zeno.app: "true"
      zeno.app.kind: "core"

    ports:
      - "9090:9090"

    environment:
      DASHBOARD_USER: admin
      DASHBOARD_PASS: admin
      SECRET_KEY: super-secret-key

      PYTHONUNBUFFERED: "1"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    security_opt:
      - no-new-privileges:true

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9090/api/info')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s